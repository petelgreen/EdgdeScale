syntax = "proto3";

package edgescale;

service ServiceA {
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc AnalyzeText(AnalyzeTextRequest) returns (AnalyzeTextResponse);
  rpc UploadAndAnalyzeFile(stream FileRequest) returns (AnalyzeFileResponse);
}

message HeartbeatRequest {
  string device_id = 1;
  int64  timestamp  = 2;
}

message HeartbeatResponse {}

message AnalyzeTextRequest {
  string device_id = 1;
  string text      = 2;
}

message AnalyzeTextResponse {
  int32 word_count = 1;
}

message FileRequest {
  string device_id = 1;
  bytes  data      = 2;
}

message AnalyzeFileResponse {
  int32 word_count = 1;
}
